general.import = [
    "~/.config/alacritty/themes/catppuccin-mocha.toml"
]


[env]
TERM = "xterm-256color"

[window]
padding.x = 10
padding.y = 10

decorations = "Buttonless"

opacity = 0.65
#blur = true
#dynamic_padding = true

[mouse]
hide_when_typing = true

[font]
#family = "JetBrainsMonoNLNerdFont_Regular"

size = 14


